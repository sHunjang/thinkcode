title: "이진탐색 구현"
level: "advanced"
concept_tag: "알고리즘, 이진탐색"
order_idx: 3

description: |
  정렬된 정수 리스트와 목표값을 입력받아 이진탐색으로 목표값의 인덱스를 반환하는 함수를 작성하세요.
  목표값이 없으면 -1을 반환하세요.

  예시:
  - solution([1, 3, 5, 7, 9], 7) → 3
  - solution([1, 3, 5, 7, 9], 4) → -1

starter_code: |
  def solution(numbers, target):
      # 이진탐색을 구현하세요
      return

test_cases:
  - input: "[[1, 3, 5, 7, 9], 7]"
    output: "3"
  - input: "[[1, 3, 5, 7, 9], 4]"
    output: "-1"
  - input: "[[2, 4, 6, 8, 10], 2]"
    output: "0"

hint_keywords: "left, right, mid, while 반복, 범위 좁히기"
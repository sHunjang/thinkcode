title: "팰린드롬 판별"
level: "intermediate"
concept_tag: "문자열, 슬라이싱"
order_idx: 2

description: |
  문자열을 입력받아 팰린드롬이면 True, 아니면 False를 반환하는 함수를 작성하세요.
  팰린드롬은 앞에서 읽으나 뒤에서 읽으나 같은 문자열입니다.

  예시:
  - solution("racecar") → True
  - solution("hello") → False

starter_code: |
  def solution(s):
      # 여기에 코드를 작성하세요
      return

test_cases:
  - input: '["racecar"]'
    output: "true"
  - input: '["hello"]'
    output: "false"
  - input: '["madam"]'
    output: "true"

hint_keywords: "슬라이싱([::-1]), 문자열 비교"